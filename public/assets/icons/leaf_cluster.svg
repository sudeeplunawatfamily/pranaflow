<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 320" fill="none">
  <!-- Curved stem from bottom to top -->
  <path d="M76 318 C70 272 54 228 63 182 C70 148 84 112 72 66 C68 48 61 30 57 12"
        stroke="#8CCAF2" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Leaf 1 – bottom, large, angled left -->
  <path d="M0-52 C20.8-31.2 26 10.4 0 52 C-26 10.4 -20.8-31.2 0-52 Z"
        transform="translate(55,252) rotate(-28)"
        fill="#9CCEF5" opacity="0.50"/>

  <!-- Leaf 2 – lower-mid, medium, angled right -->
  <path d="M0-44 C17.6-26.4 22 8.8 0 44 C-22 8.8 -17.6-26.4 0-44 Z"
        transform="translate(90,196) rotate(36)"
        fill="#AED8F7" opacity="0.44"/>

  <!-- Leaf 3 – middle, medium, angled left -->
  <path d="M0-40 C16-24 20 8 0 40 C-20 8 -16-24 0-40 Z"
        transform="translate(60,140) rotate(-22)"
        fill="#8CCAF2" opacity="0.46"/>

  <!-- Leaf 4 – upper, smaller, angled right -->
  <path d="M0-34 C13.6-20.4 17 6.8 0 34 C-17 6.8 -13.6-20.4 0-34 Z"
        transform="translate(84,88) rotate(28)"
        fill="#C4EAFA" opacity="0.50"/>

  <!-- Leaf 5 – top, small, angled left -->
  <path d="M0-26 C10.4-15.6 13 5.2 0 26 C-13 5.2 -10.4-15.6 0-26 Z"
        transform="translate(65,42) rotate(-18)"
        fill="#D4EFFF" opacity="0.46"/>
</svg>
