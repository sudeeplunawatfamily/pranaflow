server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Vite-hashed JS/CSS bundles — filenames change on rebuild, safe to cache forever
  location ~* \.(?:js|css)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Static images and icons — cache 7 days, revalidate on change
  location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # Audio files — short cache so swapped files are picked up quickly
  location ~* \.mp3$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    try_files $uri =404;
  }
}
